    create ads, write a phone script, build a quiz, develop their USP, get more bookings,
    or says 'help me get more clients,' 'build my funnel,' 'write my ads,' 'I need
    more leads,' 'fix my marketing,' 'build my quiz,' 'what should my offer be,' or
    'I want to hit $30K months.' Also trigger when someone mentions they're a photographer
